# --- Vortex static SPA ---
# Place built `dist/` at /var/www/vortex/dist
# Then: ln -s /etc/nginx/sites-available/vortex /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/vortex/dist;
    index index.html;

    # gzip + brotli (если установлен)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache hashed Vite assets
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long-cache mirrored static site assets (images, fonts, pdfs)
    location /site/upload/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location /site/_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — все остальные пути отдают index.html, React Router разруливает
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Безопасные заголовки
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
